<div id="gallery-container" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 15px;">
    <div th:each="img : ${images}" class="card" style="padding: 10px; border: 1px solid #ddd;">
        <!-- Pointing to a custom resource handler (see below) -->
        <img th:src="@{/files/{name}(name=${img})}" style="width: 100%; height: auto; border-radius: 5px;">
        <p th:text="${img}" style="font-size: 0.8rem; overflow: hidden; text-overflow: ellipsis;"></p>
        <button th:hx-get="'/ui/classify?filename=' + ${img}" 
                hx-target="#classification-result" 
                class="secondary">Classify</button>
    </div>
</div>
